<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
    <title>Document</title>
</head>
<body>
    <main>
        <div class="calculator">
            <div class="display"></div>
            <div class="controls">
                <button id="del-btn"><i class="ph ph-backspace"></i></button>
                <button id="clr-btn">C</button>
                <button id="op-btn">%</button>
                <button id="op-btn">+</button>
                <button id="num-btn">7</button>
                <button id="num-btn">8</button>
                <button id="num-btn">9</button>
                <button id="op-btn">-</button>
                <button id="num-btn">4</button>
                <button id="num-btn">5</button>
                <button id="num-btn">6</button>
                <button id="op-btn">x</button>
                <button id="num-btn">1</button>
                <button id="num-btn">2</button>
                <button id="num-btn">3</button>
                <button id="op-btn">/</button>
                <button id="num-btn">0</button>
                <button id="num-btn">.</button>
                <button id="op-btn">=</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
