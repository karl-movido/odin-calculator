<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="calculator">
        <div class="display">
          <p id="history" class="history">5 * 5</p>
          <p id="result" class="result">25</p>
        </div>
        <div class="controls" id="controls">
          <button id="del-btn" class="del-btn" data-value="del">
            <i class="ph ph-backspace"></i>
          </button>
          <button id="clr-btn" class="del-btn" data-value="clear">C</button>
          <button id="op-btn" class="op-btn" data-value="%">%</button>
          <button id="op-btn" class="op-btn" data-value="+">+</button>
          <button id="num-btn" class="num-btn" data-value="7">7</button>
          <button id="num-btn" class="num-btn" data-value="8">8</button>
          <button id="num-btn" class="num-btn" data-value="9">9</button>
          <button id="op-btn" class="op-btn" data-value="-">-</button>
          <button id="num-btn" class="num-btn" data-value="4">4</button>
          <button id="num-btn" class="num-btn" data-value="5">5</button>
          <button id="num-btn" class="num-btn" data-value="6">6</button>
          <button id="op-btn" class="op-btn" data-value="x">x</button>
          <button id="num-btn" class="num-btn" data-value="1">1</button>
          <button id="num-btn" class="num-btn" data-value="2">2</button>
          <button id="num-btn" class="num-btn" data-value="3">3</button>
          <button id="op-btn" class="op-btn" data-value="/">/</button>
          <button id="num-btn" class="num-btn num-zero" data-value="0">
            0
          </button>
          <button id="num-btn" class="num-btn" data-value=".">.</button>
          <button id="eq-btn" class="eq-btn" data-value="=">=</button>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
